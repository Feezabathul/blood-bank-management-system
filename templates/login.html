{% extends "base.html" %}

{% block title %}Staff Login - BloodConnect{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Staff Portal</h1>
    <p>Secure access for hospital administrators and staff members.</p>
</div>

<div class="form-section" style="max-width: 450px; margin: 0 auto;">
    <h2 class="form-title">Login to Your Account</h2>
    
    <form method="POST" action="/login">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required placeholder="e.g. admin">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; background-color: #333; border-color: #333;">Login</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <p style="color: var(--text-muted); font-size: 0.9rem;">Not a staff member? <a href="/register" style="color: var(--primary-red); font-weight: 500;">Register as a donor</a></p>
    </div>
</div>
{% endblock %}
