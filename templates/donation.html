{% extends "base.html" %}

{% block title %}Record Donation - BloodConnect{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Record Donation</h1>
    <p>Document a new donation entry and verify eligibility status.</p>
</div>

<div class="form-section">
    <h2 class="form-title">Donation Details</h2>
    <form id="donation-form">
        <div class="form-group">
            <label for="donor_id">Select Registered Donor</label>
            <select id="donor_id" name="donor_id" required>
                <option value="" disabled selected>Search by name or group...</option>
                <!-- Filled via JS -->
            </select>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="donation_date">Donation Date</label>
                <input type="date" id="donation_date" name="donation_date" required>
            </div>
            <div class="form-group">
                <label for="units_donated">Units Donated (ml)</label>
                <input type="number" id="units_donated" name="units_donated" required min="100" max="1000" step="50" placeholder="450">
            </div>
        </div>

        <div id="eligibility-info" style="margin-bottom: 1.5rem; display: none;">
            <div class="badge" id="eligibility-badge"></div>
            <p id="eligibility-msg" style="font-size: 0.9rem; margin-top: 0.5rem;"></p>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Record Donation Entry</button>
    </form>
</div>

<script>
    // Set default date to today
    document.getElementById('donation_date').valueAsDate = new Date();
</script>
{% endblock %}
